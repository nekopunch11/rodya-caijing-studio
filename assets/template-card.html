<!--
  财经内容台 · 客户版卡片模板（墨账本 Swiss）v0.1
  规范唯一事实源：references/card-components.md
  画板：3:4 / 1080×1440（小红书·朋友圈·微信通吃）。渲染：Playwright 或 html2canvas 截 .card，1×→1080×1440，或 2× 出高清。
  用法：复制 .card 骨架 → 招牌带填标的/代码/市场/数据截至 → 主视觉区换成对应模块签名图形（见文件底部 SIGNATURE LIBRARY）→ 填关键数字/风险 → footer 固定件保持不动。
  铁律：配色只走下方 :root 变量，禁自定义 hex；红/绿只标涨跌方向数据；品牌墨黑只进招牌带。
-->
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<style>
  :root{
    --ink:#111111;      /* 墨：文字/线/图形/招牌带 */
    --paper:#FFFFFF;    /* 冷白纸底 */
    --muted:#888888;    /* 次级文字 */
    --hair:#EDEDED;     /* 内部发丝线 */
    --empty:#DCDCDC;    /* 空态填充 */
    --up:#C0392B;       /* 涨（红）——仅涨跌数据 */
    --down:#1E9E5A;     /* 跌（绿）——仅涨跌数据 */
    --sans:"Source Han Sans SC","Noto Sans SC","MiSans","Microsoft YaHei",sans-serif;
    --mono:"SF Mono","JetBrains Mono","Consolas",monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#5a5a5a;}
  .card{
    width:1080px;height:1440px;background:var(--paper);color:var(--ink);
    font-family:var(--sans);display:flex;flex-direction:column;overflow:hidden;
  }
  /* 招牌带 */
  .masthead{background:var(--ink);color:#fff;padding:44px 72px 40px;}
  .masthead .row{display:flex;align-items:baseline;gap:20px;}
  .masthead .name{font-size:52px;font-weight:600;letter-spacing:1px;}
  .masthead .code{font-family:var(--mono);font-size:30px;color:#bdbdbd;}
  .masthead .module{margin-left:auto;font-size:26px;letter-spacing:6px;}
  .masthead .meta{font-family:var(--mono);font-size:24px;color:#9a9a9a;margin-top:14px;letter-spacing:1px;}
  /* body */
  .body{flex:1;padding:56px 72px 0;display:flex;flex-direction:column;}
  .seclabel{font-size:24px;letter-spacing:6px;color:var(--muted);}
  .rule{height:2px;background:var(--ink);}
  .hair{height:2px;background:var(--hair);}
  /* hero 越大越细 */
  .hero-num{font-size:200px;font-weight:200;line-height:.9;letter-spacing:-4px;font-variant-numeric:tabular-nums;}
  .hero-unit{font-size:64px;font-weight:300;}
  /* 五源清单 */
  .moat{font-family:var(--mono);font-size:34px;line-height:2.1;}
  .moat .li{display:flex;justify-content:space-between;}
  .moat .sq{letter-spacing:6px;}
  .total-num{font-size:96px;font-weight:200;font-variant-numeric:tabular-nums;}
  /* 关键数字栅格 */
  .kpis{display:grid;grid-template-columns:1fr 1fr;border-top:2px solid var(--ink);}
  .kpi{padding:26px 24px;}
  .kpi:first-child{border-right:2px solid var(--hair);}
  .kpi .k{font-size:22px;letter-spacing:2px;color:var(--muted);}
  .kpi .v{font-size:64px;font-weight:300;font-variant-numeric:tabular-nums;margin-top:6px;}
  .kpi .v small{font-size:30px;color:var(--muted);}
  .up{color:var(--up);} .down{color:var(--down);}
  /* 风险 */
  .risk{border-left:6px solid var(--ink);padding-left:22px;}
  .risk .k{font-size:22px;letter-spacing:2px;color:var(--muted);}
  .risk .t{font-size:30px;margin-top:4px;}
  /* footer 固定件 */
  .footer{padding:28px 72px 40px;}
  .footer .bar{display:flex;justify-content:space-between;font-family:var(--mono);font-size:22px;color:var(--muted);margin-top:20px;}
  .spacer{flex:1;}
</style>
</head>
<body>

<div class="card">

  <!-- ===== 招牌带（所有模块共用，只换文字） ===== -->
  <div class="masthead">
    <div class="row">
      <span class="name">宁德时代</span>
      <span class="code">300750</span>
      <span class="module">基本面体检</span>
    </div>
    <div class="meta">A股 · 数据截至 2026-07-10</div>
  </div>

  <div class="body">

    <!-- ===== 主视觉区：签名图形（此处为基本面参考实现，换模块见底部 LIBRARY） ===== -->
    <div style="margin-bottom:8px;">
      <div class="seclabel">近 5 年平均 ROE</div>
      <div style="display:flex;align-items:flex-end;gap:12px;">
        <span class="hero-num">18.5</span><span class="hero-unit" style="margin-bottom:22px;">%</span>
      </div>
    </div>

    <div style="margin-top:34px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <span class="seclabel">护城河五源</span>
        <span class="total-num">7<span style="font-size:40px;color:var(--muted);"> / 10</span></span>
      </div>
      <div class="hair" style="margin:12px 0 16px;"></div>
      <div class="moat">
        <div class="li">无形资产<span class="sq">■■</span></div>
        <div class="li">转换成本<span class="sq">■□</span></div>
        <div class="li">网络效应<span class="sq">□□</span></div>
        <div class="li">成本优势<span class="sq">■■</span></div>
        <div class="li">规模效应<span class="sq">■□</span></div>
      </div>
    </div>

    <!-- ===== 关键数字区（3–5 条，涨跌染色） ===== -->
    <div class="kpis" style="margin-top:44px;">
      <div class="kpi"><div class="k">现金流 / 净利</div><div class="v">1.15<small>×</small></div></div>
      <div class="kpi"><div class="k">营收 5Y CAGR</div><div class="v">32<small>%</small> <span style="font-size:34px;">▲</span></div></div>
    </div>

    <!-- ===== 估值分位 band ===== -->
    <div style="margin-top:44px;">
      <div style="display:flex;justify-content:space-between;"><span class="seclabel">当前估值 · 近 5 年分位</span><span style="font-family:var(--mono);font-size:30px;">62%</span></div>
      <div style="position:relative;height:10px;background:var(--hair);margin-top:16px;">
        <div style="position:absolute;left:0;top:0;height:10px;width:62%;background:var(--ink);"></div>
        <div style="position:absolute;left:62%;top:-5px;width:4px;height:20px;background:var(--ink);"></div>
      </div>
    </div>

    <!-- ===== 风险提示区（最高 1 条） ===== -->
    <div class="risk" style="margin-top:44px;">
      <div class="k">风险</div>
      <div class="t">公开信息提示 2 项，重点关注 1 项</div>
    </div>

    <div class="spacer"></div>
  </div>

  <!-- ===== footer 固定件（锁定，勿改结构） ===== -->
  <div class="footer">
    <div class="rule"></div>
    <div class="bar">
      <span>客观体检 · 不含买卖建议</span>
      <span>来源 Wind · 公司年报 · 2026-07-10</span>
    </div>
  </div>

</div>

<!--
================= SIGNATURE LIBRARY（把对应块贴进「主视觉区」替换基本面） =================

【财报 · 超预期矩阵】红绿=涨跌/超预期，唯一常态用彩处
<table style="width:100%;border-collapse:collapse;font-family:var(--mono);font-size:34px;">
  <tr style="color:var(--muted);font-size:24px;"><td></td><td align="center">同比</td><td align="center">环比</td><td align="center">预期</td></tr>
  <tr><td>营收</td><td align="center" class="up">▲</td><td align="center" class="up">▲</td><td align="center" class="up">beat</td></tr>
  <tr><td>归母净利</td><td align="center" class="up">▲</td><td align="center" class="down">▼</td><td align="center" style="color:var(--muted)">=</td></tr>
  <tr><td>扣非</td><td align="center" class="up">▲</td><td align="center" class="up">▲</td><td align="center" class="down">miss</td></tr>
</table>

【估值 · 分位 band】当前点墨色（非涨跌）
（用主卡里的 band 块，配 P25/中位/P75 刻度 + 当前分位大数）

【排雷 · 风险维度】墨色标记，不上红绿灯
<div class="moat">
  <div class="li">经营<span>○</span></div>
  <div class="li">财务<span>●</span></div>
  <div class="li">治理<span>◐</span></div>
  <div class="li">政策<span>○</span></div>
  <div class="li">流动性<span>◐</span></div>
</div>
底部计数：●重点 1 · ◐提示 2 · ○无 2

【产业链 · 利润池图谱】墨阶深浅=利润池集中度
<div style="display:flex;gap:10px;text-align:center;font-family:var(--mono);">
  <div style="flex:1"><div style="height:52px;background:#bdbdbd"></div><div>上游 25%</div></div>
  <div style="flex:1"><div style="height:52px;background:var(--ink)"></div><div>中游 45%</div></div>
  <div style="flex:1"><div style="height:52px;background:#6b6b6b"></div><div>下游 30%</div></div>
</div>

【A股打新 · 破发统计】纯统计无建议
发行 PE 28.4× / 行业 PE 22.1×（tabular 对照）+ 板块同类组首日破发率大数 + 墨色进度条

【港股打新 · 关键因子】对客不含申购建议
基石占比 52% / 孖展超购 8.3× / 保荐人近12月 6/8 未破（中性清单）+ 同类组首日破发率大数 + 墨条

================================================================================
-->

</body>
</html>
